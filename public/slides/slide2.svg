<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <text x="960" y="250" font-size="80" fill="#ffffff" text-anchor="middle" font-family="sans-serif" font-weight="bold">体を左右に動かして操作</text>
  <text x="960" y="380" font-size="50" fill="#f8fafc" text-anchor="middle" font-family="sans-serif">Webカメラの前で左右に動き、「硬」を避けて「柔」を集める。</text>

  <g transform="translate(0, 100)">
    <circle cx="600" cy="600" r="100" fill="#22d3ee" opacity="0.9"/>
    <text x="600" y="630" font-size="70" fill="#0f172a" text-anchor="middle" font-family="sans-serif" font-weight="bold">柔</text>
    <text x="600" y="780" font-size="50" fill="#22d3ee" text-anchor="middle" font-family="sans-serif" font-weight="bold">集める！</text>

    <text x="960" y="630" font-size="100" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">←  →</text>

    <rect x="1200" y="480" width="200" height="200" fill="#ef4444" opacity="0.9" transform="rotate(45 1300 580)"/>
    <text x="1300" y="610" font-size="70" fill="#0f172a" text-anchor="middle" font-family="sans-serif" font-weight="bold">硬</text>
    <text x="1300" y="780" font-size="50" fill="#ef4444" text-anchor="middle" font-family="sans-serif" font-weight="bold">避ける！</text>
  </g>
</svg>
